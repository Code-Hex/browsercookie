name: browser

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: ${{ matrix.browser }} integration
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            test_name: TestChromeReadsCookieFromRealBrowser
          - browser: edge
            test_name: TestEdgeReadsCookieFromRealBrowser
          - browser: firefox
            test_name: TestFirefoxReadsCookieFromRealBrowser
          - browser: safari
            test_name: TestSafariReadsCookieFromRealBrowser

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Enable Safari WebDriver
        if: matrix.browser == 'safari'
        run: sudo safaridriver --enable

      - name: Run real browser integration test
        env:
          BROWSERCOOKIE_REAL_BROWSER: "1"
        run: go test -count=1 -run '^${{ matrix.test_name }}$' -v ./...
